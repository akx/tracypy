name: CI

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uvx cibuildwheel==4.1.0 --output-dir wheelhouse
        env:
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_SKIP: "*-musllinux*"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
  capture:
    name: Build tracy-capture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
      - id: rev
        run: echo "sha=$(git -C third_party/tracy rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - id: cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/tracy-capture
          key: tracy-capture-${{ runner.os }}-${{ steps.rev.outputs.sha }}
      # tracy-capture is built from the vendored submodule so its protocol
      # matches our client exactly. The capture/ CMake pulls Tracy's whole vendor
      # tree (GLFW, freetype, nfd→dbus, …) even though the headless tool links
      # none of it, so those dev packages are needed just to configure. capstone
      # stays on CPM (Tracy needs 6.0; distro packages are too old).
      - name: Build tracy-capture
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libglfw3-dev libfreetype-dev libdbus-1-dev \
            libpugixml-dev libcurl4-openssl-dev libtbb-dev
          cmake -S third_party/tracy/capture -B build-capture -DCMAKE_BUILD_TYPE=Release
          cmake --build build-capture --target tracy-capture --parallel
          mkdir -p ~/tracy-capture
          cp build-capture/tracy-capture ~/tracy-capture/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tracy-capture
          path: ~/tracy-capture/tracy-capture
  test:
    name: Smoke test (Python ${{ matrix.python-version }})
    needs: capture
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tracy-capture
          path: tracy-bin
      # Put tracy-capture on PATH so the e2e test picks it up (artifacts drop the
      # executable bit, so restore it).
      - run: |
          chmod +x "$PWD/tracy-bin/tracy-capture"
          echo "$PWD/tracy-bin" >> "$GITHUB_PATH"
      - run: uv run --python ${{ matrix.python-version }} pytest --cov=tracypy --cov-report=term-missing
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uvx ruff@0.15.17 check .
      - run: uvx ruff@0.15.17 format --check .
  pypi-publish:
    name: Upload release to PyPI
    needs: [build, test, lint]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tracypy
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cibw-wheels-*
          merge-multiple: true
          path: dist
      - name: Verify tag matches wheel version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          for whl in dist/*.whl; do
            ver="$(basename "$whl" | cut -d- -f2)"
            if [ "$ver" != "$tag" ]; then
              echo "::error::tag v$tag does not match wheel version $ver ($whl)"
              exit 1
            fi
          done
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
